<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCPToolGuard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>MCPToolGuard</h1>
      <p class="tagline">Server enforces scopes on MCP; agent log shows intent</p>
    </header>

    <main>
      <section class="panel chat-panel">
        <div class="controls">
          <div id="auth-controls" class="auth-controls" hidden>
            <button id="auth-login" type="button">Sign in</button>
            <button id="auth-logout" type="button" hidden>Sign out</button>
            <span id="auth-status" class="auth-status"></span>
          </div>
          <label id="guest-token-label">
            JWT scope (guest)
            <select id="token">
              <option value="read_only">Read only (flights:read)</option>
              <option value="booking">Booking (read + write)</option>
              <option value="admin">Admin (read + write + delete)</option>
            </select>
          </label>
          <button id="init" type="button">Initialize</button>
          <span id="status" class="status">Not initialized</span>
        </div>

        <div id="chat" class="chat"></div>

        <div class="input-row">
          <input id="message" type="text" placeholder="Flights, bookings, or documents (DOC-42)..." />
          <button id="send" type="button" disabled>Send</button>
        </div>
      </section>

      <section class="panel log-panel">
        <h2>Audit log</h2>
        <p class="log-panel-sub">Server = enforcement · Agent attempts = SDK pre-check · Agent trace = model + routing (click trace id to correlate)</p>
        <div id="audit-log" class="audit-log"></div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
