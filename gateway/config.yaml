# MCPToolGuard — canonical guard / proxy policy (single source of truth).
# UI client pre-check and future guard proxy (#12) read this file.
# servers/flight/guard_config.yaml is demo-only (embedded guard on flight MCP until proxy).
servers:
  flight:
    url: http://localhost:8000/mcp
    tools:
      search_flights_tool:
        required_scope: flights:read
      get_flight_details:
        required_scope: flights:read
      track_flight_tool:
        required_scope: flights:read
      create_booking_tool:
        required_scope: flights:write
      get_booking_tool:
        required_scope: flights:read
      modify_booking_tool:
        required_scope: flights:write
      check_in_tool:
        required_scope: flights:write
      select_seats_tool:
        required_scope: flights:write
      add_baggage_tool:
        required_scope: flights:write
      cancel_booking_tool:
        required_scope: flights:delete
        alert: true
        log_level: verbose

  github:
    url: https://api.githubcopilot.com/mcp/
    upstream_token_env: GITHUB_MCP_TOKEN
    tools:
      get_me:
        required_scope: repo:read
      list_branches:
        required_scope: repo:read
      get_file_contents:
        required_scope: repo:read
      search_code:
        required_scope: repo:read
      search_repositories:
        required_scope: repo:read
      list_commits:
        required_scope: repo:read
      get_commit:
        required_scope: repo:read
      list_issues:
        required_scope: repo:read
      get_issue:
        required_scope: repo:read
      list_pull_requests:
        required_scope: repo:read
      get_pull_request:
        required_scope: repo:read
      create_or_update_file:
        required_scope: repo:write
      push_files:
        required_scope: repo:write
      create_pull_request:
        required_scope: repo:write
        alert: true
      create_issue:
        required_scope: repo:write
      create_branch:
        required_scope: repo:write

  slack-prop:
    url: https://mcp.slack.com/mcp
    upstream_token_env: SLACK_MCP_TOKEN
    tools:
      slack_send_message:
        required_scope: slack:write
      slack_read_channel:
        required_scope: slack:read
      slack_read_thread:
        required_scope: slack:read
