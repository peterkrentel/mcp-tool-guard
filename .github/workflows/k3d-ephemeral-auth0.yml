name: k3d-ephemeral-auth0

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/k3d-ephemeral-auth0.yml
      - deploy/ephemeral/**
      - gateway/**
      - ui/**
      - scripts/smoke-auth0-k3d.sh
      - package.json
      - package-lock.json

jobs:
  ephemeral:
    runs-on: ubuntu-latest
    env:
      CLUSTER_NAME: guard-ephemeral
      NAMESPACE: guard-ephemeral
      UI_HOST: ui.ephemeral.local
      GUARD_HOST: guard.ephemeral.local
      KV_TOKEN: local-ephemeral-kv-token
      MCP_JWT_ISSUER: ${{ secrets.MCP_JWT_ISSUER }}
      MCP_JWT_AUDIENCE: ${{ secrets.MCP_JWT_AUDIENCE }}
      MCP_JWT_JWKS_URL: ${{ secrets.MCP_JWT_JWKS_URL }}
      MCP_GUARD_PUBLIC_KEY_PEM: ${{ secrets.MCP_GUARD_PUBLIC_KEY_PEM }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
      AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build gateway image
        run: |
          docker build -f gateway/Dockerfile -t mcp-tool-guard-gateway:${{ github.sha }} .

      - name: Build UI image
        run: |
          docker build \
            -f ui/Dockerfile \
            --build-arg VITE_MCP_URL=http://${GUARD_HOST}/mcp \
            --build-arg VITE_PROXY_BASE_URL=http://${GUARD_HOST} \
            -t mcp-tool-guard-ui:${{ github.sha }} .

      - name: Build KV REST adapter image
        run: |
          docker build -f deploy/ephemeral/kv-rest-adapter/Dockerfile -t mcp-tool-guard-kv-rest-adapter:${{ github.sha }} .

      - name: Install kubectl
        run: |
          curl -fsSL -o kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Validate required secrets
        env:
          MCP_JWT_ISSUER: ${{ secrets.MCP_JWT_ISSUER }}
          MCP_JWT_AUDIENCE: ${{ secrets.MCP_JWT_AUDIENCE }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
          MCP_JWT_JWKS_URL: ${{ secrets.MCP_JWT_JWKS_URL }}
          MCP_GUARD_PUBLIC_KEY_PEM: ${{ secrets.MCP_GUARD_PUBLIC_KEY_PEM }}
        run: |
          missing=0
          for key in MCP_JWT_ISSUER MCP_JWT_AUDIENCE AUTH0_AUDIENCE AUTH0_DOMAIN AUTH0_MGMT_CLIENT_ID AUTH0_MGMT_CLIENT_SECRET MCP_JWT_JWKS_URL MCP_GUARD_PUBLIC_KEY_PEM; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Create ephemeral Auth0 operator client
        run: |
          set -euo pipefail

          MGMT_TOKEN="$(curl -sS -X POST "https://${AUTH0_DOMAIN}/oauth/token" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${AUTH0_MGMT_CLIENT_ID}\",\"client_secret\":\"${AUTH0_MGMT_CLIENT_SECRET}\",\"audience\":\"https://${AUTH0_DOMAIN}/api/v2/\",\"grant_type\":\"client_credentials\"}" \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{const j=JSON.parse(d);if(!j.access_token){process.stderr.write(d);process.exit(1)}process.stdout.write(j.access_token)})')"

          CLIENT_NAME="ci-ephemeral-operator-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CREATE_RESPONSE="$(curl -sS -X POST "https://${AUTH0_DOMAIN}/api/v2/clients" \
            -H "Authorization: Bearer ${MGMT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${CLIENT_NAME}\",\"app_type\":\"non_interactive\",\"grant_types\":[\"client_credentials\"],\"token_endpoint_auth_method\":\"client_secret_post\"}")"

          OPERATOR_CLIENT_ID="$(printf '%s' "${CREATE_RESPONSE}" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{const j=JSON.parse(d);if(!j.client_id){process.stderr.write(d);process.exit(1)}process.stdout.write(j.client_id)})')"
          OPERATOR_CLIENT_SECRET="$(printf '%s' "${CREATE_RESPONSE}" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{const j=JSON.parse(d);if(!j.client_secret){process.stderr.write(d);process.exit(1)}process.stdout.write(j.client_secret)})')"

          GRANT_RESPONSE="$(curl -sS -X POST "https://${AUTH0_DOMAIN}/api/v2/client-grants" \
            -H "Authorization: Bearer ${MGMT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${OPERATOR_CLIENT_ID}\",\"audience\":\"${AUTH0_AUDIENCE}\",\"scope\":[\"gateway:admin\"]}")"
          GRANT_ID="$(printf '%s' "${GRANT_RESPONSE}" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{const j=JSON.parse(d);if(!j.id){process.stderr.write(d);process.exit(1)}process.stdout.write(j.id)})')"

          echo "::add-mask::${OPERATOR_CLIENT_SECRET}"
          echo "AUTH0_OPERATOR_CLIENT_ID=${OPERATOR_CLIENT_ID}" >> "$GITHUB_ENV"
          echo "AUTH0_OPERATOR_CLIENT_SECRET=${OPERATOR_CLIENT_SECRET}" >> "$GITHUB_ENV"
          echo "AUTH0_EPHEMERAL_OPERATOR_CLIENT_ID=${OPERATOR_CLIENT_ID}" >> "$GITHUB_ENV"
          echo "AUTH0_EPHEMERAL_OPERATOR_GRANT_ID=${GRANT_ID}" >> "$GITHUB_ENV"

      - name: Create k3d cluster
        run: |
          k3d cluster create ${CLUSTER_NAME} --wait --timeout 5m --port "80:80@loadbalancer"
          kubectl cluster-info
          kubectl get nodes
          echo "127.0.0.1 ${UI_HOST} ${GUARD_HOST}" | sudo tee -a /etc/hosts

      - name: Import images
        run: |
          k3d image import mcp-tool-guard-gateway:${{ github.sha }} -c ${CLUSTER_NAME}
          k3d image import mcp-tool-guard-ui:${{ github.sha }} -c ${CLUSTER_NAME}
          k3d image import mcp-tool-guard-kv-rest-adapter:${{ github.sha }} -c ${CLUSTER_NAME}

      - name: Create namespace and secrets
        run: |
          kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
          printf '%s' "${MCP_GUARD_PUBLIC_KEY_PEM}" > /tmp/mcp-guard-public.pem
          kubectl -n ${NAMESPACE} create secret generic guard-secrets \
            --from-literal=KV_REST_API_TOKEN="${KV_TOKEN}" \
            --from-literal=MCP_JWT_ISSUER="${MCP_JWT_ISSUER}" \
            --from-literal=MCP_JWT_AUDIENCE="${MCP_JWT_AUDIENCE}" \
            --from-literal=MCP_JWT_JWKS_URL="${MCP_JWT_JWKS_URL}" \
            --from-literal=AUTH0_DOMAIN="${AUTH0_DOMAIN}" \
            --from-literal=AUTH0_AUDIENCE="${AUTH0_AUDIENCE}" \
            --from-literal=AUTH0_MGMT_CLIENT_ID="${AUTH0_MGMT_CLIENT_ID}" \
            --from-literal=AUTH0_MGMT_CLIENT_SECRET="${AUTH0_MGMT_CLIENT_SECRET}" \
            --from-file=MCP_GUARD_PUBLIC_KEY_PEM=/tmp/mcp-guard-public.pem \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm chart
        run: |
          helm upgrade --install guard-ephemeral deploy/ephemeral/helm/guard-ephemeral \
            -n ${NAMESPACE} \
            --set ui.image.tag=${{ github.sha }} \
            --set guard.image.tag=${{ github.sha }} \
            --set kv.rest.image.tag=${{ github.sha }}

      - name: Wait for rollout
        run: |
          on_rollout_failure() {
            echo "Rollout failed. Dumping pod diagnostics..."
            kubectl -n ${NAMESPACE} get pods -o wide || true
            kubectl -n ${NAMESPACE} describe deployment kv-rest || true
            kubectl -n ${NAMESPACE} describe pod -l app=kv-rest || true
            kubectl -n ${NAMESPACE} logs deployment/kv-rest --tail=200 || true
            kubectl -n ${NAMESPACE} logs deployment/redis --tail=200 || true
            kubectl -n ${NAMESPACE} logs deployment/guard --tail=200 || true
            kubectl -n ${NAMESPACE} logs deployment/ui --tail=200 || true
          }
          trap on_rollout_failure ERR
          kubectl -n ${NAMESPACE} rollout status deployment/redis --timeout=180s
          kubectl -n ${NAMESPACE} rollout status deployment/kv-rest --timeout=300s
          kubectl -n ${NAMESPACE} rollout status deployment/guard --timeout=240s
          kubectl -n ${NAMESPACE} rollout status deployment/ui --timeout=240s
          trap - ERR
          kubectl -n ${NAMESPACE} get pods -o wide
          kubectl -n ${NAMESPACE} get ingress

      - name: Smoke test (Auth0 + UI + guard)
        env:
          GUARD_BASE_URL: http://${{ env.GUARD_HOST }}
          UI_BASE_URL: http://${{ env.UI_HOST }}
          MCP_JWT_ISSUER: ${{ secrets.MCP_JWT_ISSUER }}
          MCP_JWT_AUDIENCE: ${{ secrets.MCP_JWT_AUDIENCE }}
        run: |
          ./scripts/smoke-auth0-k3d.sh

      - name: Cleanup cluster
        if: always()
        run: |
          if [ -n "${AUTH0_EPHEMERAL_OPERATOR_CLIENT_ID:-}" ]; then
            MGMT_TOKEN="$(curl -sS -X POST "https://${AUTH0_DOMAIN}/oauth/token" \
              -H "Content-Type: application/json" \
              -d "{\"client_id\":\"${AUTH0_MGMT_CLIENT_ID}\",\"client_secret\":\"${AUTH0_MGMT_CLIENT_SECRET}\",\"audience\":\"https://${AUTH0_DOMAIN}/api/v2/\",\"grant_type\":\"client_credentials\"}" \
              | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{const j=JSON.parse(d);if(!j.access_token){process.stderr.write(d);process.exit(1)}process.stdout.write(j.access_token)})')"

            if [ -n "${AUTH0_EPHEMERAL_OPERATOR_GRANT_ID:-}" ]; then
              curl -sS -X DELETE "https://${AUTH0_DOMAIN}/api/v2/client-grants/${AUTH0_EPHEMERAL_OPERATOR_GRANT_ID}" \
                -H "Authorization: Bearer ${MGMT_TOKEN}" >/dev/null || true
            fi

            curl -sS -X DELETE "https://${AUTH0_DOMAIN}/api/v2/clients/${AUTH0_EPHEMERAL_OPERATOR_CLIENT_ID}" \
              -H "Authorization: Bearer ${MGMT_TOKEN}" >/dev/null || true
          fi

          if command -v k3d >/dev/null 2>&1; then
            k3d cluster delete ${CLUSTER_NAME} || true
          fi
