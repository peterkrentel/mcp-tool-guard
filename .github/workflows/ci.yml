name: ci

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Demo embedded guard matches gateway policy
        run: npm run check:demo-policy

      - name: Build UI
        run: npm run build -w @mcp-tool-guard/ui

  flight-server:
    name: Flight MCP (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servers/flight
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Verify server imports
        run: uv run python -c "from server import app, create_app, get_guard; from guard import FlightToolGuard; assert get_guard().enabled"
