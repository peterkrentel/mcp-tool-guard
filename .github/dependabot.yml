version: 2

updates:
  # Root npm workspace (gateway + ui)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Flight MCP server (pyproject.toml)
  - package-ecosystem: pip
    directory: /servers/flight
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # Keep Dependabot config current when GitHub Actions are added
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
