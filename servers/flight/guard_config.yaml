# Flight MCP tool scopes — mirrors gateway/config.yaml → servers.flight.tools
server: flight
tools:
  search_flights_tool:
    required_scope: flights:read
  get_flight_details:
    required_scope: flights:read
  track_flight_tool:
    required_scope: flights:read
  create_booking_tool:
    required_scope: flights:write
  get_booking_tool:
    required_scope: flights:read
  modify_booking_tool:
    required_scope: flights:write
  check_in_tool:
    required_scope: flights:write
  select_seats_tool:
    required_scope: flights:write
  add_baggage_tool:
    required_scope: flights:write
  cancel_booking_tool:
    required_scope: flights:delete
    alert: true
    log_level: verbose
